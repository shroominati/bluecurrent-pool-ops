services:
  - type: web
    name: florida-wreck-signal
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run wreck:start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: WRECK_APP_USER
        value: admin
      - key: WRECK_APP_PASSWORD
        sync: false
      - key: WRECK_APP_AUTH_ENABLED
        value: "true"

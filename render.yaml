databases:
  - name: bluecurrent-pool-ops-db
    databaseName: bluecurrent_pool_ops
    user: bluecurrent_pool_ops
    plan: basic-256mb

services:
  - type: web
    name: bluecurrent-pool-ops
    runtime: node
    plan: starter
    region: oregon
    autoDeploy: true
    healthCheckPath: /api/config
    buildCommand: npm install
    startCommand: npm run app:start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: bluecurrent-pool-ops-db
          property: connectionString
      - key: ROUTING_PROVIDER
        value: mapbox
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      - key: MAPBOX_PROFILE
        value: mapbox/driving-traffic
      - key: QBO_CLIENT_ID
        sync: false
      - key: QBO_CLIENT_SECRET
        sync: false
      - key: QBO_REDIRECT_URI
        sync: false
      - key: QBO_ENVIRONMENT
        value: sandbox
